version: '3.8'

services:
 # gateway:
    #build: ./gateway
    #ports:
    #  - "3000:3000"

  auth-service:
    build: ./services/auth-service
    ports:
      - "3001:3001"

  property-service:
    build: ./services/property-service
    ports:
      - "3002:8000"

  booking-service:
    build: ./services/booking-service
    ports:
      - "3004:3002"
    depends_on:
      - property-service

  db-property:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: kos_db
      MYSQL_ROOT_PASSWORD: password

  db-booking:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: booking_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - booking_db_data:/var/lib/mysql

volumes:
  booking_db_data: